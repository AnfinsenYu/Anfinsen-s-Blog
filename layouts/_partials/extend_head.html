<style>
/* 汉堡菜单按钮 */
.menu-toggle {
    display: none !important;
    background: none;
    border: none;
    color: var(--primary);
    cursor: pointer;
    padding: 0.5rem;
    line-height: 1;
    z-index: 1001;
}
.menu-toggle svg {
    display: block;
    transition: transform 0.3s ease;
}

/* 汉堡变 X */
.menu-toggle.active .menu-icon {
    display: none;
}
.menu-toggle .close-icon {
    display: none;
}
.menu-toggle.active .close-icon {
    display: block;
}

/* 遮罩层 */
.menu-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 998;
    opacity: 0;
    transition: opacity 0.3s ease;
}
.menu-overlay.active {
    display: block;
    opacity: 1;
}

/* 手机端响应式 */
@media screen and (max-width: 768px) {
    /* 首页：头像和文字上下堆叠 */
    .profile_inner {
        flex-direction: column !important;
        text-align: center;
    }
    .profile_inner > div:first-child {
        order: 1;
    }
    .profile_inner > div:last-child {
        order: 0;
        margin-bottom: 1rem;
    }

    /* 汉堡按钮显示 */
    .menu-toggle {
        display: block !important;
    }

    /* 菜单背景布 - 从上往下滑出 */
    #menu {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: 100vh;
        background: var(--entry);
        flex-direction: column;
        padding: 5rem 2rem 2rem;
        gap: 0;
        margin: 0;
        z-index: 999;
        overflow-y: auto;
        transform: translateY(-100%);
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #menu.menu-open {
        transform: translateY(0);
    }

    /* 菜单项 - 延迟滑入 */
    #menu li {
        opacity: 0;
        transform: translateY(-20px);
        transition: opacity 0.3s ease, transform 0.3s ease;
        padding: 1rem 0;
        border-bottom: 1px solid var(--border);
    }
    #menu li:last-child {
        border-bottom: none;
    }
    #menu.menu-open li {
        opacity: 1;
        transform: translateY(0);
    }
    /* 延迟效果：每个菜单项依次出现 */
    #menu.menu-open li:nth-child(1) { transition-delay: 0.3s; }
    #menu.menu-open li:nth-child(2) { transition-delay: 0.35s; }
    #menu.menu-open li:nth-child(3) { transition-delay: 0.4s; }
    #menu.menu-open li:nth-child(4) { transition-delay: 0.45s; }
    #menu.menu-open li:nth-child(5) { transition-delay: 0.5s; }
    #menu.menu-open li:nth-child(6) { transition-delay: 0.55s; }

    /* 收起时无延迟，同步收回 */
    #menu li:not(.menu-open li) {
        transition-delay: 0s;
    }

    #menu li a {
        display: block;
        width: 100%;
        font-size: 1.2rem;
    }

    /* header-nav 在手机端换行 */
    .header-nav {
        flex-wrap: wrap;
    }

    /* 图片响应式 */
    .post-content img,
    .entry-content img,
    .post-entry img {
        max-width: 100% !important;
        height: auto !important;
    }

    /* 表格横向滚动 */
    .post-content table,
    .entry-content table,
    .post-entry table,
    table {
        display: block;
        overflow-x: auto;
        max-width: 100%;
    }

    /* 代码块横向滚动 */
    .post-content pre,
    .entry-content pre,
    .highlight pre,
    pre {
        overflow-x: auto;
        max-width: 100%;
    }
}
</style>
