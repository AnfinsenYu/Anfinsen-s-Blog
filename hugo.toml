baseURL = 'https://anfinsenyu.github.io/Anfinsen-s-Blog/'
locale = 'zh-cn'
title = 'AnBlog'
theme = 'PaperMod'
buildFuture = true

[pagination]
  pagersize = 50

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowToc = true
  comments = false

[params.profileMode]
  enabled = true
  title = "欢迎来到我的博客 ✨"
  subtitle = "分享技术💻生活🏠与思考🔍 🚀"
  imageUrl = "/images/avatar.jpg"
  imageWidth = 180
  imageHeight = 180
  imageTitle = "头像"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/AnfinsenYu"

[params.search]
  enable = true
  showSearch = true


[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    lineNos = true
    style = "monokai"
    codeFences = true
    guessSyntax = true
    noClasses = false

[taxonomies]
  category = "categories"
  tag = "tags"

[[menu.main]]
  identifier = "posts"
  name = "📝 文章"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "categories"
  name = "📁 分类"
  url = "/categories/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "🏷️ 标签"
  url = "/tags/"
  weight = 30

[[menu.main]]
  identifier = "archives"
  name = "📦 归档"
  url = "/archives/"
  weight = 40

[[menu.main]]
  identifier = "about"
  name = "👤 关于"
  url = "/about/"
  weight = 50

[[menu.main]]
  identifier = "search"
  name = "🔍 搜索"
  url = "/search/"
  weight = 60
